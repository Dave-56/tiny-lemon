# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e6b019e8e3b778b97883dac2d0c46755"
name = "tiny-lemon"
application_url = "https://tinylemon.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app_subscriptions/update"

  # Mandatory compliance webhooks (GDPR / privacy) — use compliance_topics, single URI
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/compliance"

[access_scopes]
# read_products: read product info for context
# write_products: push generated images back to product listings
scopes = "read_products,write_products"

[auth]
redirect_urls = [ "https://tinylemon.vercel.app/auth/callback" ]
